<!DOCTYPE html>
<html lang="pt-br">
<head>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script srv="config.js"></script>
    <script src="script.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Cabeçalho -->
    <header class="bg-success text-white text-center py-4">
        <div class="container">
            <h1 class="display-5">Sistema de Análise de Sentimentos</h1>
            <p class="lead">IFSULDEMINAS</p>
        </div>

    <!-- Conteúdo principal -->
    <main class="flex-grow-1 d-flex flex-column align-items-center gap-3 p-4">
        <h2 class="text-center">Análise de Sentimento</h2>
        <textarea id="textoParaAnalisar" class="form-control w-75" rows="5" placeholder="Digite o texto para analisar o sentimento..."></textarea>
        <button class="btn btn-success" onclick="analisarSentimento()">Analisar Sentimento</button>
        <div class="fw-bold">Resultado: <span id="resultado"></span></div>
    </main>

    <!-- Rodapé -->
    <footer class="bg-success text-white text-center py-3">

            <p class="mb-0">&copy; 2025 Sistema de Análise de Sentimentos - IFSULDEMINAS</p>

   </body>
